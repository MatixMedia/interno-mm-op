    <style>
        /* ESTILOS VISUALES MATIXMEDIA */
        :root {
            --bg: #04050A;
            --bg-2: #0C0D13;
            --bg-3: #14151C;
            --accent: #E8C046;
            --teal: #199477;
            --red: #CF343A;
            --ink: #FDFCF7;
            --ink-dim: #A8A598;
            --line: #1E1F28;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        a { color: var(--accent); text-decoration: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-2); }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
        
        .wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        /* HEADER */
        .report-header { background: var(--bg-2); border-bottom: 1px solid var(--line); padding: 24px 0; }
        .report-header .wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo-circle { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); flex-shrink: 0; background: var(--bg-3); display: flex; align-items: center; justify-content: center; }
        .logo-circle svg { width: 100%; height: 100%; object-fit: contain; }
        .header-title { font-size: 10px; text-transform: uppercase; letter-spacing: .15em; color: var(--ink-dim); margin-bottom: 3px; font-family: var(--mono); }
        .header-client { font-size: 20px; font-weight: 600; color: var(--ink); }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; width: 100%; max-width: 400px; }

        /* BUSCADOR */
        .search-input { width: 100%; background: var(--bg-3); border: 1px solid var(--line); color: var(--ink); font-family: var(--mono); font-size: 13px; padding: 10px 14px; border-radius: 6px; outline: none; transition: .2s; }
        .search-input:focus { border-color: var(--accent); }
        .search-input:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-sync { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-dim); font-size: 11px; font-family: var(--mono); padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: .2s; white-space: nowrap; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .btn-sync:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* CHANNEL TABS */
        .channel-bar { background: var(--bg-2); border-bottom: 1px solid var(--line); padding: 0; margin-bottom: 24px;}
        .channel-bar .wrap { display: flex; align-items: center; gap: 0; overflow-x: auto;}
        .ch-tab { display: flex; align-items: center; gap: 8px; padding: 14px 20px; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--ink-dim); transition: .2s; user-select: none; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;}
        .ch-tab:hover { color: var(--ink); }
        .ch-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .ch-tab .tab-count { background: var(--bg-3); padding: 2px 6px; border-radius: 4px; font-size: 10px; border: 1px solid var(--line); }
        .ch-tab.active .tab-count { background: rgba(232,192,70,.1); border-color: rgba(232,192,70,.3); color: var(--accent); }

        /* SECTION & BADGES */
        .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--ink); margin-bottom: 16px; display: block;}
        
        .doc-badge { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; }
        .badge-informe { background: rgba(25,148,119,.15); color: var(--teal); border: 1px solid rgba(25,148,119,.3); }
        .badge-auditoria { background: rgba(207,52,58,.15); color: var(--red); border: 1px solid rgba(207,52,58,.3); }
        .badge-estrategia { background: rgba(232,192,70,.15); color: var(--accent); border: 1px solid rgba(232,192,70,.3); }
        .badge-otro { background: rgba(168,165,152,.1); color: var(--ink-dim); border: 1px solid var(--line); }

        /* BUTTONS */
        .btn-action { background-color: var(--bg-3); border: 1px solid var(--line); color: var(--ink-dim); transition: .2s; font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; gap: 4px;}
        .btn-action:hover { background-color: var(--bg-2); color: var(--ink); border-color: var(--ink-dim); }
        
        .btn-wa { color: #25D366; }
        .btn-wa:hover { border-color: #25D366; background-color: rgba(37, 211, 102, 0.05);}
        
        .btn-primary { background-color: var(--bg-3); border: 1px solid var(--line); color: var(--ink-dim); transition: .2s; font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; cursor: pointer; font-weight: 500;}
        .btn-primary:hover { background-color: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

        .loader { border: 2px solid var(--line); border-top: 2px solid var(--accent); border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }

    <script>
        // ==========================================
        // CONFIGURACIÓN 
        // ==========================================
        const GITHUB_USER = "MatixMedia"; 
        const GITHUB_REPO = "matixmedia-clientes"; 
        const DOMINIO = "portal.matix.media"; 
        const BITLY_TOKEN = "61700ed51e442eba0a7f49dc327f4b9607c14668"; 
        
        let todosLosRecursos = [];
        let filtroActual = 'todos';

        window.onload = function() {
            // Fecha dinámica para el footer
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('footerDate').textContent = 'Generado: ' + new Date().toLocaleDateString('es-CO', dateOptions);
        };

        // Identificar el tipo de documento basándose en el nombre
        function clasificarDocumento(nombre) {
            const n = nombre.toLowerCase();
            if (n.includes('informe')) return { tipo: 'informe', badge: 'Informes', clase: 'badge-informe' };
            if (n.includes('audit')) return { tipo: 'auditoria', badge: 'Auditoría', clase: 'badge-auditoria' };
            if (n.includes('estrategia') || n.includes('strategy')) return { tipo: 'estrategia', badge: 'Estrategia', clase: 'badge-estrategia' };
            return { tipo: 'otro', badge: 'Documento', clase: 'badge-otro' };
        }

        async function sincronizarGitHub() {
            const btnSync = document.getElementById('btnSync');
            const syncText = document.getElementById('syncText');
            const searchInput = document.getElementById('searchInput');

            syncText.innerHTML = '<span class="loader"></span> Escaneando...';
            btnSync.disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/git/trees/main?recursive=1`);
                if (!response.ok) throw new Error("Repositorio no encontrado.");
                
                const data = await response.json();
                
                // Procesar y clasificar archivos HTML
                todosLosRecursos = data.tree
                    .filter(item => item.type === 'blob' && item.path.endsWith('.html'))
                    .map(item => {
                        const nombreArchivo = item.path.split('/').pop();
                        const clasificacion = clasificarDocumento(nombreArchivo);
                        return { ...item, nombreArchivo, ...clasificacion };
                    });
                
                // Actualizar contadores en los tabs
                document.getElementById('count-todos').innerText = todosLosRecursos.length;
                document.getElementById('count-informe').innerText = todosLosRecursos.filter(r => r.tipo === 'informe').length;
                document.getElementById('count-auditoria').innerText = todosLosRecursos.filter(r => r.tipo === 'auditoria').length;
                document.getElementById('count-estrategia').innerText = todosLosRecursos.filter(r => r.tipo === 'estrategia').length;

                syncText.innerText = 'Actualizado';
                setTimeout(() => { syncText.innerText = 'Sincronizar Repo'; btnSync.disabled = false; }, 2000);
                
                searchInput.disabled = false;
                searchInput.focus();

                filtrarRecursos(); 
            } catch (error) {
                alert("Error conectando a GitHub. Verifica que el repo sea público.");
                syncText.innerText = 'Error';
                btnSync.disabled = false;
            }
        }

        function cambiarFiltro(tipo, elementoTab) {
            filtroActual = tipo;
            document.querySelectorAll('.ch-tab').forEach(btn => btn.classList.remove('active'));
            elementoTab.classList.add('active');
            filtrarRecursos();
        }

        function filtrarRecursos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const contenedor = document.getElementById('contenedorResultados');
            
            let filtrados = todosLosRecursos.filter(info => info.path.toLowerCase().includes(query));
            
            // Aplicar el filtro de tipo de documento (Pestañas)
            if (filtroActual !== 'todos') {
                filtrados = filtrados.filter(info => info.tipo === filtroActual);
            }

            if (filtrados.length === 0) {
                contenedor.innerHTML = '<div class="py-12 text-center text-[var(--ink-dim)] font-mono text-xs uppercase tracking-widest border border-dashed border-[var(--line)] rounded-lg">No se encontraron recursos.</div>';
                return;
            }

            const aMostrar = filtrados.slice(0, 50);
            let html = '';

            aMostrar.forEach((info, index) => {
                const urlCompleta = `https://${DOMINIO}/${info.path}`;
                
                const partesRuta = info.path.split('/');
                let cliente = "Cliente"; 

                if (partesRuta.length > 1) {
                    if (partesRuta[0].toLowerCase() === 'clientes' && partesRuta.length > 2) {
                        cliente = partesRuta[1]; 
                    } else {
                        cliente = partesRuta[partesRuta.length - 2];
                    }
                }

                // Generar asunto basado en el tipo de doc
                let tipoDisplay = info.tipo.charAt(0).toUpperCase() + info.tipo.slice(1);
                if(info.tipo === 'otro') tipoDisplay = 'Documento';

                const textoMensaje = `¡Hola! ${cliente} En el siguiente link encontrarás el documento (${info.badge}) actualizado:\n\n${urlCompleta}`;
                const asuntoCorreo = `${tipoDisplay} MatixMedia: ${cliente}`;
                
                const linkWA = `https://wa.me/?text=${encodeURIComponent(textoMensaje)}`;
                const linkEmail = `mailto:?subject=${encodeURIComponent(asuntoCorreo)}&body=${encodeURIComponent(textoMensaje)}`;

                html += `
                    <div class="bg-[var(--bg-3)] border border-[var(--line)] rounded-lg p-4 transition-colors hover:bg-[var(--bg)] group">
                        <div class="flex flex-col lg:flex-row justify-between lg:items-center gap-4">
                            
                            <div class="overflow-hidden flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="doc-badge ${info.clase}">${info.badge}</span>
                                    <span class="font-mono text-[10px] text-[var(--ink-dim)] uppercase tracking-widest">${cliente}</span>
                                </div>
                                <h3 class="font-semibold text-[var(--ink)] text-sm truncate">
                                    ${info.nombreArchivo.replace('.html', '')}
                                </h3>
                                <p class="text-xs text-[var(--ink-dim)] mt-1 truncate font-mono opacity-60 group-hover:opacity-100 transition-opacity" id="url-${index}">${urlCompleta}</p>
                            </div>
                            
                            <div class="flex flex-wrap gap-2 shrink-0">
                                <a href="${urlCompleta}" target="_blank" id="abrir-${index}" class="btn-action" title="Abrir">
                                    Abrir
                                </a>
                                
                                <a href="${linkWA}" target="_blank" id="wa-${index}" rel="noopener noreferrer" class="btn-action btn-wa" title="WhatsApp">
                                    WA
                                </a>

                                <a href="${linkEmail}" target="_top" id="email-${index}" rel="noopener noreferrer" class="btn-action" title="Correo">
                                    Correo
                                </a>

                                <button onclick="generarLinkCortoBitly('${urlCompleta}', ${index}, '${cliente}', '${info.badge}', this)" class="btn-primary">
                                    Bitly
                                </button>
                                
                                <button onclick="copiarAlPortapapelesDirecto('url-${index}', this)" class="btn-primary">
                                    Copiar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
        }

        // ==========================================
        // ACORTADOR BITLY Y COPIADO
        // ==========================================
        async function generarLinkCortoBitly(urlLarga, indexId, cliente, tipoDoc, boton) {
            const originalHTML = boton.innerHTML;
            boton.innerHTML = '...'; boton.disabled = true;

            try {
                const response = await fetch('https://api-ssl.bitly.com/v4/shorten', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${BITLY_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "long_url": urlLarga, "domain": "bit.ly" })
                });

                if (!response.ok) throw new Error("Error API Bitly");
                const data = await response.json(); const urlCorta = data.link; 
                
                document.getElementById(`url-${indexId}`).innerHTML = `<span class="text-[var(--teal)] font-bold">${urlCorta}</span>`;
                
                const textoMensaje = `¡Hola! ${cliente} En el siguiente link encontrarás el documento (${tipoDoc}) actualizado:\n\n${urlCorta}`;
                document.getElementById(`wa-${indexId}`).href = `https://wa.me/?text=${encodeURIComponent(textoMensaje)}`;
                document.getElementById(`email-${indexId}`).href = `mailto:?subject=${encodeURIComponent(tipoDoc + ' MatixMedia: ' + cliente)}&body=${encodeURIComponent(textoMensaje)}`;
                document.getElementById(`abrir-${indexId}`).href = urlCorta;

                copiarTexto(urlCorta);
                boton.innerHTML = 'Ok';
                setTimeout(() => { boton.innerHTML = originalHTML; boton.disabled = false; }, 2000);
            } catch (error) {
                alert("Fallo al acortar con Bitly.");
                boton.innerHTML = originalHTML; boton.disabled = false;
            }
        }

        function copiarAlPortapapelesDirecto(idElemento, boton) {
            copiarTexto(document.getElementById(idElemento).innerText);
            const original = boton.innerHTML;
            boton.innerHTML = 'Copiado';
            boton.classList.add('!bg-[var(--teal)]', '!text-[var(--bg)]', '!border-[var(--teal)]');
            setTimeout(() => { 
                boton.innerHTML = original;
                boton.classList.remove('!bg-[var(--teal)]', '!text-[var(--bg)]', '!border-[var(--teal)]');
            }, 2000);
        }

        function copiarTexto(texto) {
            const temp = document.createElement("textarea");
            temp.value = texto; document.body.appendChild(temp);
            temp.select(); document.execCommand("copy");
            document.body.removeChild(temp);
        }
    </script>
</body>
</html>
