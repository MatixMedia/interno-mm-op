<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Centro de Recursos - MatixMedia</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MatixMedia/interno-mm-op/9479956aa727b81bf736abc2e34cd6e7c9ac5fa6/logo-oficial.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #04050A;
            --bg-2: #0C0D13;
            --bg-3: #14151C;
            --accent: #E8C046;
            --teal: #199477;
            --red: #CF343A;
            --blue: #4A9EE0;
            --ink: #FDFCF7;
            --ink-dim: #A8A598;
            --line: #1E1F28;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }
        body { font-family: var(--sans); background-color: var(--bg); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .bg-panel { background-color: var(--bg-2); }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); color: var(--bg-2); }
        .bg-accent:hover { background-color: #d1ab3e; }
        .loader { border: 2px solid var(--line); border-top: 2px solid var(--accent); border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
        
        /* TABS */
        .channel-bar { background: var(--bg-2); border-bottom: 1px solid var(--line); margin-bottom: 24px; display: flex; overflow-x: auto; scrollbar-width: none; }
        .channel-bar::-webkit-scrollbar { display: none; }
        .ch-tab { display: flex; align-items: center; gap: 8px; padding: 14px 20px; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--ink-dim); transition: .2s; user-select: none; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;}
        .ch-tab:hover { color: var(--ink); }
        .ch-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .ch-tab .ch-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .6; }
        .ch-tab.active .ch-dot { opacity: 1; }
        
        /* BADGES */
        .badge-status { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .06em; }
        .badge-informe { background: rgba(25,148,119,.2); color: var(--teal); border: 1px solid rgba(25,148,119,.3); }
        .badge-auditoria { background: rgba(207,52,58,.2); color: var(--red); border: 1px solid rgba(207,52,58,.3); }
        .badge-estrategia { background: rgba(232,192,70,.15); color: var(--accent); border: 1px solid rgba(232,192,70,.3); }
        .badge-hub { background: rgba(74,158,224,.15); color: var(--blue); border: 1px solid rgba(74,158,224,.3); }
        .badge-otro { background: rgba(168,165,152,.15); color: var(--ink-dim); border: 1px solid rgba(168,165,152,.3); }

        /* FOOTER */
        .report-footer{background:var(--bg-2);border-top:1px solid var(--line);padding:24px 0;margin-top:32px; width: 100%;}
        .footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px; max-width: 1024px; margin: 0 auto; padding: 0 24px;}
        .footer-brand{display:flex;align-items:center;gap:10px}
        
        /* Ajuste del logo para centrado absoluto */
        .footer-logo{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--accent); display:flex; justify-content:center; align-items:center;}
        .footer-logo img{width:100%;height:100%;object-fit:cover; object-position:center; transform-origin:center; transform: scale(1.05);}
        
        .footer-name{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600}
        .footer-sub{font-size:9px;color:var(--ink-dim)}
        .footer-date{font-family:var(--mono);font-size:9px;color:var(--ink-dim);margin-top:2px}
        .footer-links{display:flex;align-items:center;gap:8px}
        .footer-social{width:30px;height:30px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:.2s;cursor:pointer}
        .footer-social:hover{background:var(--accent);border-color:var(--accent)}
        .footer-social:hover svg{fill:var(--bg-2)}
        .footer-social svg{width:14px;height:14px;fill:var(--ink-dim);transition:.2s}
        .footer-wa{display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;padding:7px 12px;border-radius:18px;cursor:pointer;border:none;animation:wa-shake 10s infinite; text-decoration:none;}
        .footer-wa:hover{background:#20b858;}
        .footer-wa svg{width:14px;height:14px;fill:#fff;flex-shrink:0}
        @keyframes wa-shake{0%,85%,100%{transform:none}87%{transform:rotate(-12deg)}89%{transform:rotate(12deg)}91%{transform:rotate(-8deg)}93%{transform:rotate(8deg)}95%{transform:rotate(-4deg)}97%{transform:rotate(0)}}
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between items-center">

            <svg class="w-5 h-5 absolute left-4 top-4 text-[#A8A598]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <!-- Pestañas de Filtrado -->
        <div class="channel-bar" id="tabs-container">
            <div class="ch-tab active" onclick="setFiltroTipo('Todos', this)"><span class="ch-dot"></span>Todos</div>
            <div class="ch-tab" onclick="setFiltroTipo('Informe', this)"><span class="ch-dot" style="color: var(--teal)"></span>Informes</div>
            <div class="ch-tab" onclick="setFiltroTipo('Auditoría', this)"><span class="ch-dot" style="color: var(--red)"></span>Auditorías</div>
            <div class="ch-tab" onclick="setFiltroTipo('Estrategia', this)"><span class="ch-dot" style="color: var(--accent)"></span>Estrategias</div>
            <div class="ch-tab" onclick="setFiltroTipo('HUB de contenido', this)"><span class="ch-dot" style="color: var(--blue)"></span>HUB de contenido</div>
        </div>

        <!-- Alertas de Error -->
        <div id="errorMsg" class="hidden mb-4 p-4 rounded-lg bg-[rgba(207,52,58,0.1)] border border-[rgba(207,52,58,0.3)] text-[#CF343A] text-sm" style="font-family: var(--mono)"></div>

        <!-- Resultados -->
        <div class="bg-[#14151C] rounded-xl border border-[#1E1F28] shadow-lg overflow-hidden flex flex-col">
            <div class="bg-[#0C0D13] px-4 py-3 border-b border-[#1E1F28] flex justify-between items-center text-xs" style="font-family: var(--mono)">
                <span class="text-[#A8A598] font-medium uppercase tracking-wider">Documentos Encontrados</span>

            </div>

                    Esperando sincronización...

    </div>

    <script>
        // ==========================================
        // ESCUDO ANTI-CURIOSOS (Bloqueo de Inspección)
        // ==========================================
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        
        document.addEventListener('keydown', function (event) {
            if (event.key === 'F12' || event.keyCode === 123) {
                event.preventDefault();
            }
            if (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'i' || event.key === 'J' || event.key === 'j' || event.key === 'C' || event.key === 'c' || event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) {
                event.preventDefault();
            }
            if (event.ctrlKey && (event.key === 'U' || event.key === 'u' || event.keyCode === 85)) {
                event.preventDefault();
            }
            if (event.ctrlKey && (event.key === 'S' || event.key === 's' || event.keyCode === 83)) {
                event.preventDefault();
            }
        });

        // ==========================================
        // CONFIGURACIÓN PRINCIPAL DE FUENTES
        // ==========================================
        const FUENTES_DATOS = [
            {
                usuario: "MatixMedia",
                repo: "matixmedia-clientes",
                dominio: "portal.matix.media"
            },
            {
                usuario: "MatixMedia",
                repo: "interno-mm-op",
                dominio: "interno.matix.media" 
            }
        ];
        
        let todosLosDocumentos = [];
        let filtroActual = 'Todos';
        const mesesDelAnio = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];

        document.getElementById('footerDate').textContent = 'Generado: ' + new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function showError(msg) {
            const errDiv = document.getElementById('errorMsg');
            errDiv.innerHTML = msg;
            errDiv.classList.remove('hidden');
            if(!msg.includes('Límite')) {
                setTimeout(() => errDiv.classList.add('hidden'), 8000);
            }
        }

        async function sincronizarGitHub() {
            const btnSync = document.getElementById('btnSync');
            const syncText = document.getElementById('syncText');
            const searchInput = document.getElementById('searchInput');

            syncText.innerHTML = '<span class="loader"></span> Sincronizando repositorios...';
            btnSync.disabled = true;
            document.getElementById('errorMsg').classList.add('hidden');

            let documentosCombinados = [];
            let erroresDetectados = [];

            try {
                let promesas = FUENTES_DATOS.map(async (fuente) => {
                    try {
                        const res = await fetch(`https://api.github.com/repos/${fuente.usuario}/${fuente.repo}/git/trees/main?recursive=1`);
                        
                        if (res.status === 404) throw new Error(`El repositorio "${fuente.repo}" no existe o es PRIVADO.`);
                        if (res.status === 403) throw new Error(`Límite de peticiones de GitHub excedido (60/hora). Intenta de nuevo más tarde.`);
                        if (!res.ok) throw new Error(`Error ${res.status} al leer el repositorio "${fuente.repo}".`);
                        
                        const data = await res.json();
                        const docs = data.tree
                            .filter(item => item.type === 'blob' && item.path.endsWith('.html') && !item.path.includes('404.html') && !item.path.includes('buscador.html'))
                            .map(item => ({
                                path: item.path,
                                dominio: fuente.dominio,
                                repoOrigen: fuente.repo
                            }));
                        
                        documentosCombinados = documentosCombinados.concat(docs);

                    } catch (err) {
                        erroresDetectados.push(err.message);
                    }
                });

                await Promise.all(promesas);

                if (erroresDetectados.length > 0) {
                    showError(`<strong>Avisos durante la sincronización:</strong><br><ul class="list-disc pl-5 mt-2"><li>${erroresDetectados.join('</li><li>')}</li></ul>`);
                }

                if (documentosCombinados.length === 0) {
                    syncText.innerText = 'Sincronización Fallida';
                    btnSync.disabled = false;
                    return; 
                }

                todosLosDocumentos = documentosCombinados;
                
                syncText.innerText = 'Repositorios Sincronizados';
                btnSync.classList.add('text-[#199477]', 'border-[#199477]');
                
                searchInput.disabled = false;
                searchInput.placeholder = "Buscar cliente, marca o mes (Ej: megapagos)...";
                searchInput.focus();

                renderizarInformes(); 

            } catch (error) {
                showError("Error crítico del sistema: " + error.message);
                syncText.innerText = 'Error de conexión';
                btnSync.disabled = false;
            }
        }

        function setFiltroTipo(tipo, elemento) {
            filtroActual = tipo;
            const tabs = document.querySelectorAll('.ch-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            elemento.classList.add('active');
            renderizarInformes();
        }

        function clasificarDocumento(info) {
            if (info.repoOrigen.toLowerCase().includes('hub')) return 'HUB de contenido';
            
            const lower = info.path.toLowerCase();
            if (lower.includes('informe')) return 'Informe';
            if (lower.includes('audit')) return 'Auditoría';
            if (lower.includes('estrategia') || lower.includes('strategy')) return 'Estrategia';
            if (lower.includes('hub') || lower.includes('contenido')) return 'HUB de contenido';
            return 'Otro';
        }

        function renderizarInformes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const contenedor = document.getElementById('contenedorResultados');
            
            const filtrados = todosLosDocumentos.filter(info => {
                const coincideTexto = info.path.toLowerCase().includes(query);
                const tipoDoc = clasificarDocumento(info);
                const coincideTipo = filtroActual === 'Todos' || tipoDoc === filtroActual;
                return coincideTexto && coincideTipo;
            });

            document.getElementById('contadorResultados').innerText = filtrados.length;

            if (filtrados.length === 0) {
                contenedor.innerHTML = `<div class="p-8 text-center text-[#A8A598]" style="font-family: var(--mono); font-size: 12px;">No se encontraron documentos para "${query}" en la categoría ${filtroActual}.</div>`;
                return;
            }

            const aMostrar = filtrados.slice(0, 50);
            let html = '';

            aMostrar.forEach((info, index) => {
                // 1. RUTA LARGA ORIGINAL (Para abrir el informe directamente)
                const urlCompleta = `https://${info.dominio}/${info.path}`;
                
                const partesRuta = info.path.split('/');
                let cliente = "General"; 
                let nombreArchivo = partesRuta[partesRuta.length - 1]; 
                
                // 2. RUTA CORTA NATIVA (Para botones de compartir)
                // Se asume que la carpeta 'ir' aloja el mismo nombre de archivo
                const urlCorta = `https://${info.dominio}/ir/${nombreArchivo}`;

                // LÓGICA INTELIGENTE PARA ENCONTRAR AL CLIENTE
                const indexClientes = partesRuta.findIndex(part => part.toLowerCase() === 'clientes');
                
                if (indexClientes !== -1 && partesRuta.length > indexClientes + 1) {
                    cliente = partesRuta[indexClientes + 1];
                } else if (partesRuta.length > 1) {
                    cliente = partesRuta[partesRuta.length - 2];
                }

                const tipo = clasificarDocumento(info);
                let badgeClass = 'badge-otro';
                if (tipo === 'Informe') badgeClass = 'badge-informe';
                if (tipo === 'Auditoría') badgeClass = 'badge-auditoria';
                if (tipo === 'Estrategia') badgeClass = 'badge-estrategia';
                if (tipo === 'HUB de contenido') badgeClass = 'badge-hub';

                let mesEncontrado = "reciente";
                for (let i = 0; i < mesesDelAnio.length; i++) {
                    if (nombreArchivo.toLowerCase().includes(mesesDelAnio[i])) {
                        mesEncontrado = "el mes de " + mesesDelAnio[i].charAt(0).toUpperCase() + mesesDelAnio[i].slice(1);
                        break;
                    }
                }

                // Generación de mensajes usando urlCorta para que no vean la url larga
                let textoMensaje = "";
                let asuntoCorreo = `Documento MatixMedia: ${cliente} - ${tipo}`;

                if (tipo === 'HUB de contenido') {
                    textoMensaje = `¡Hola! Aquí tienes el acceso directo al HUB de Contenido actualizado:\n\n${urlCorta}`;
                    asuntoCorreo = `HUB de Contenido - MatixMedia`;
                } else if (tipo === 'Informe') {
                    textoMensaje = `¡Hola! ${cliente} En el siguiente link encontrarás el documento (${tipo}) actualizado a ${mesEncontrado}:\n\n${urlCorta}`;
                } else {
                    textoMensaje = `¡Hola! ${cliente} En el siguiente link encontrarás el documento de ${tipo} solicitado:\n\n${urlCorta}`;
                }
                
                const linkWA = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoMensaje)}`;
                const linkEmail = `mailto:?subject=${encodeURIComponent(asuntoCorreo)}&body=${encodeURIComponent(textoMensaje)}`;

                html += `
                    <div class="bg-[#0c0d13] border border-[#1E1F28] rounded-lg p-4 hover:border-[#A8A598] transition-colors">
                        <div class="flex flex-col lg:flex-row justify-between lg:items-center gap-4">
                            <div class="overflow-hidden flex-1">
                                <!-- AQUÍ OCURRE LA MAGIA: Etiqueta y Cliente en color texto gris, Tipografía Monoespaciada -->
                                <div class="mb-2 flex items-center gap-3">
                                    <span class="badge-status ${badgeClass}">${tipo}</span>
                                    <span class="text-[#A8A598] text-xs font-medium tracking-wider uppercase truncate" style="font-family: var(--mono);">${cliente}</span>
                                </div>
                                
                                <!-- Abajo va únicamente la información del archivo -->
                                <h3 class="text-[#FDFCF7] text-sm truncate mb-1">
                                    ${nombreArchivo.replace('.html','')}
                                </h3>
                                
                                <!-- Se muestra visualmente la URL Completa para identificar la ubicación real -->
                                <p class="text-[11px] text-[#A8A598] truncate select-all" style="font-family: var(--mono);">${urlCompleta}</p>
                            </div>
                            
                            <div class="flex flex-wrap gap-2 shrink-0">
                                <!-- ABRIR: Usa la URL larga -->
                                <a href="${urlCompleta}" target="_blank" rel="noopener noreferrer" class="bg-[#14151C] hover:bg-[#1E1F28] text-[#FDFCF7] text-xs px-3 py-2 rounded border border-[#1E1F28] transition-colors flex items-center gap-1" title="Abrir Documento">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                    Abrir
                                </a>
                                
                                <!-- WHATSAPP Y EMAIL: Usan la URL Corta (/ir/) -->
                                <a href="${linkWA}" target="_blank" rel="noopener noreferrer" class="bg-[#25D366]/10 hover:bg-[#25D366]/20 text-[#25D366] text-xs px-3 py-2 rounded border border-[#25D366]/30 transition-colors flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                                    WA
                                </a>

                                <a href="${linkEmail}" target="_top" rel="noopener noreferrer" class="bg-[#14151C] hover:bg-[#1E1F28] text-[#FDFCF7] text-xs px-3 py-2 rounded border border-[#1E1F28] transition-colors flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                    Correo
                                </a>
                                
                                <!-- COPIAR: Copia la URL Corta (/ir/) -->
                                <button onclick="copiarEnlaceDirecto('${urlCorta}', this)" class="bg-[#14151C] hover:bg-[#1E1F28] text-[#FDFCF7] text-xs px-3 py-2 rounded border border-[#1E1F28] transition-colors flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>
                                    Copiar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
        }

        // Nueva función simplificada para copiar enlaces
        function copiarEnlaceDirecto(textoURL, boton) {
            const tempInput = document.createElement("textarea");
            tempInput.value = textoURL;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            const original = boton.innerHTML;
            boton.innerHTML = '¡Copiado!';
            boton.classList.add('text-[#199477]', 'border-[#199477]');
            setTimeout(() => { 
                boton.innerHTML = original;
                boton.classList.remove('text-[#199477]', 'border-[#199477]');
            }, 2000);
        }
    </script>
</body>
</html>
</html>
